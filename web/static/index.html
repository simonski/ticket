<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ticket board</title>
    <style>
      :root {
        --bg: #0b0f1e;
        --panel: #11182b;
        --lane: #f7f3ea;
        --ticket: #fffef9;
        --ink: #1c2333;
        --muted: #677083;
        --line: #d8d2c8;
        --accent: #116466;
        --idle: #90a4ae;
        --active: #f57c00;
        --success: #2e7d32;
        --fail: #c62828;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; font-family: Georgia, "Times New Roman", serif; }
      button, input, textarea, select { font: inherit; }
      .hidden { display: none !important; }

      .login-screen {
        min-height: 100%;
        display: grid;
        place-items: center;
        color: #f7f9ff;
        background:
          radial-gradient(2px 2px at 20% 30%, #fff, transparent 70%),
          radial-gradient(1px 1px at 40% 60%, #fff, transparent 70%),
          radial-gradient(1px 1px at 70% 20%, #fff, transparent 70%),
          radial-gradient(2px 2px at 80% 70%, #fff, transparent 70%),
          radial-gradient(1px 1px at 15% 80%, #fff, transparent 70%),
          linear-gradient(180deg, #0b0f1e 0%, #1d2a4a 100%);
      }
      .login-card {
        width: min(480px, 92vw);
        background: rgba(17, 24, 43, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 14px;
        padding: 1rem;
        backdrop-filter: blur(5px);
      }
      .login-banner { font-size: 2rem; margin: 0 0 0.5rem; }
      .row { display: flex; gap: 0.45rem; flex-wrap: wrap; }
      .stack { display: grid; gap: 0.5rem; }
      input, textarea, select {
        border: 1px solid #bac2d6;
        border-radius: 8px;
        padding: 0.55rem 0.65rem;
      }
      .login-card input {
        width: 100%;
        border-color: rgba(255,255,255,0.4);
        background: rgba(255,255,255,0.08);
        color: #fff;
      }
      .btn {
        border: 1px solid #c4cfeb;
        border-radius: 999px;
        padding: 0.45rem 0.9rem;
        background: #fff;
        color: #1f2a44;
        cursor: pointer;
      }
      .btn.primary {
        background: #0ea5e9;
        border-color: #0ea5e9;
        color: #fff;
      }
      .link {
        border: 0;
        background: transparent;
        color: #9fd9ff;
        text-decoration: underline;
        cursor: pointer;
        padding: 0;
      }
      .status {
        margin-top: 0.4rem;
        color: #c7d6ff;
      }

      .app {
        min-height: 100%;
        background: #ece5d9;
        color: var(--ink);
      }
      .app-head {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.7rem;
        padding: 0.65rem 0.75rem;
        background: #fffaf2;
        border-bottom: 1px solid var(--line);
      }
      .board {
        height: calc(100vh - 58px);
        padding: 0.75rem;
        display: grid;
        gap: 0.7rem;
        grid-template-columns: repeat(4, minmax(240px, 1fr));
        overflow: auto;
      }
      .lane {
        background: var(--lane);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.65rem;
        min-height: 220px;
      }
      .lane h3 { margin: 0 0 0.4rem; text-transform: capitalize; }
      .lane.drag-over { outline: 2px dashed var(--accent); }
      .ticket {
        margin-top: 0.55rem;
        padding: 0.55rem;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--ticket);
        cursor: pointer;
      }
      .ticket[draggable="true"] { cursor: grab; }
      .ticket-top {
        display: flex;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .muted { color: var(--muted); font-size: 0.9rem; }
      .state-line {
        margin-top: 0.45rem;
        height: 4px;
        border-radius: 999px;
      }
      .state-idle { background: var(--idle); }
      .state-active { background: var(--active); }
      .state-success { background: var(--success); }
      .state-fail { background: var(--fail); }

      .fab {
        position: fixed;
        left: 1rem;
        bottom: 1rem;
        width: 52px;
        height: 52px;
        border: 0;
        border-radius: 50%;
        background: var(--accent);
        color: #fff;
        font-size: 1.6rem;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(0,0,0,0.2);
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        display: grid;
        place-items: center;
        z-index: 10;
      }
      .modal {
        width: min(640px, 92vw);
        background: #fffdf8;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.8rem;
      }
      .modal textarea { width: 100%; min-height: 120px; }
      .modal input, .modal select, .modal textarea { width: 100%; }
    </style>
  </head>
  <body>
    <section id="login-screen" class="login-screen">
      <div class="login-card">
        <h1 class="login-banner">ticket</h1>
        <form id="login-form" class="stack">
          <input id="login-user" placeholder="username" required />
          <input id="login-pass" type="password" placeholder="password" required />
          <div class="row">
            <button class="btn primary" type="submit">Login</button>
            <button id="show-register" class="link hidden" type="button">Register</button>
          </div>
        </form>
        <form id="register-form" class="stack hidden">
          <input id="register-user" placeholder="username" required />
          <input id="register-pass" type="password" placeholder="password" required />
          <div class="row">
            <button class="btn" type="submit">Create Account</button>
            <button id="hide-register" class="link" type="button">Back to login</button>
          </div>
        </form>
        <div id="login-status" class="status"></div>
      </div>
    </section>

    <section id="app" class="app hidden">
      <header class="app-head">
        <div id="app-status" class="muted"></div>
        <div class="row">
          <button id="project-new" class="btn" type="button">New Project</button>
          <select id="project-select"></select>
          <button id="logout" class="btn" type="button">Logout</button>
        </div>
      </header>
      <main id="board" class="board"></main>
      <button id="new-ticket" class="fab" title="New Ticket (N)">+</button>
    </section>

    <div id="modal-overlay" class="modal-overlay hidden">
      <div id="ticket-modal" class="modal">
        <div class="row" style="justify-content:space-between; align-items:center;">
          <strong id="modal-title">Ticket</strong>
          <span class="muted">ESC to close</span>
        </div>
        <div class="stack" style="margin-top:0.6rem;">
          <input id="ticket-title" placeholder="title" />
          <textarea id="ticket-description" placeholder="description"></textarea>
          <div class="row">
            <select id="ticket-type">
              <option value="task">task</option>
              <option value="bug">bug</option>
              <option value="chore">chore</option>
              <option value="spike">spike</option>
              <option value="epic">epic</option>
            </select>
            <select id="ticket-stage">
              <option value="design">design</option>
              <option value="develop">develop</option>
              <option value="test">test</option>
              <option value="done">done</option>
            </select>
            <select id="ticket-state">
              <option value="idle">idle</option>
              <option value="active">active</option>
              <option value="success">success</option>
              <option value="fail">fail</option>
            </select>
          </div>
          <div class="row">
            <button id="ticket-delete" class="btn" type="button">Delete</button>
            <button id="ticket-close-open" class="btn" type="button">Close</button>
            <button id="ticket-archive" class="btn" type="button">Archive</button>
          </div>
          <div class="muted">No save button. Changes are persisted as you type.</div>
        </div>
      </div>
    </div>

    <script>
      const STAGES = ["design", "develop", "test", "done"];
      const loginScreen = document.getElementById("login-screen");
      const app = document.getElementById("app");
      const loginStatus = document.getElementById("login-status");
      const appStatus = document.getElementById("app-status");
      const projectSelect = document.getElementById("project-select");
      const boardEl = document.getElementById("board");
      const modalOverlay = document.getElementById("modal-overlay");
      const modalTitle = document.getElementById("modal-title");
      const showRegisterBtn = document.getElementById("show-register");
      const registerForm = document.getElementById("register-form");

      let projects = [];
      let tickets = [];
      let socket = null;
      let socketRetry = null;
      let draft = null;
      let autosaveTimer = null;
      let token = localStorage.getItem("task-token") || "";

      function selectedProjectID() {
        return localStorage.getItem("task-project") || "";
      }
      function setSelectedProjectID(id) {
        localStorage.setItem("task-project", String(id || ""));
      }

      function headers(json = false) {
        const h = {};
        if (token) h.Authorization = `Bearer ${token}`;
        if (json) h["Content-Type"] = "application/json";
        return h;
      }

      async function call(path, options = {}) {
        const response = await fetch(path, options);
        const body = await response.text();
        let data = {};
        try { data = body ? JSON.parse(body) : {}; } catch {}
        if (!response.ok) throw new Error(data.error || `${response.status} ${response.statusText}`);
        return data;
      }

      function showLogin(message = "") {
        loginScreen.classList.remove("hidden");
        app.classList.add("hidden");
        loginStatus.textContent = message;
        const userInput = document.getElementById("login-user");
        if (userInput) {
          requestAnimationFrame(() => userInput.focus());
        }
      }
      function showApp(message = "") {
        loginScreen.classList.add("hidden");
        app.classList.remove("hidden");
        appStatus.textContent = message;
      }

      function canRegister(enabled) {
        showRegisterBtn.classList.toggle("hidden", !enabled);
      }

      async function init() {
        try {
          const status = await call("/api/status", { headers: headers() });
          canRegister(Boolean(status.registration_enabled));
          if (!status.authenticated) {
            showLogin("Please log in.");
            return;
          }
          showApp(`Logged in as ${status.user.username}`);
          await loadProjects();
          await loadTickets();
          connectWS();
        } catch (err) {
          showLogin(`Server unavailable: ${err.message}`);
        }
      }

      async function loadProjects() {
        projects = await call("/api/projects", { headers: headers() }) || [];
        const current = selectedProjectID();
        if (current && !projects.some((project) => String(project.project_id) === current)) {
          setSelectedProjectID("");
        }
        projectSelect.innerHTML = "";
        for (const project of projects) {
          const opt = document.createElement("option");
          opt.value = String(project.project_id);
          opt.textContent = `${project.prefix} · ${project.title}`;
          if (opt.value === selectedProjectID()) opt.selected = true;
          projectSelect.appendChild(opt);
        }
        if (!selectedProjectID() && projects.length > 0) setSelectedProjectID(projects[0].project_id);
        if (selectedProjectID()) projectSelect.value = selectedProjectID();
      }

      async function loadTickets() {
        const projectID = selectedProjectID();
        if (!projectID) {
          tickets = [];
          renderBoard();
          return;
        }
        try {
          tickets = await call(`/api/projects/${projectID}/tickets`, { headers: headers() }) || [];
        } catch (error) {
          if (String(error.message || "").toLowerCase().includes("project not found")) {
            setSelectedProjectID("");
            await loadProjects();
            tickets = [];
            renderBoard();
            return;
          }
          throw error;
        }
        renderBoard();
      }

      function stateColorClass(state) {
        if (state === "active") return "state-active";
        if (state === "success") return "state-success";
        if (state === "fail") return "state-fail";
        return "state-idle";
      }

      function renderBoard() {
        boardEl.innerHTML = "";
        for (const stage of STAGES) {
          const lane = document.createElement("section");
          lane.className = "lane";
          lane.dataset.stage = stage;
          const laneTickets = tickets.filter((ticket) => ticket.stage === stage);
          lane.innerHTML = `<h3>${stage}</h3><div class="muted">${laneTickets.length} tickets</div>`;
          lane.addEventListener("dragover", (event) => {
            event.preventDefault();
            lane.classList.add("drag-over");
          });
          lane.addEventListener("dragleave", () => lane.classList.remove("drag-over"));
          lane.addEventListener("drop", async (event) => {
            event.preventDefault();
            lane.classList.remove("drag-over");
            const id = event.dataTransfer.getData("text/ticket-id");
            if (!id) return;
            await moveTicketToStage(id, stage);
          });
          for (const ticket of laneTickets) {
            const card = document.createElement("article");
            card.className = "ticket";
            card.draggable = true;
            card.innerHTML = `
              <div class="ticket-top">
                <strong>${escape(ticket.title)}</strong>
                <span class="muted">${escape(ticket.key || "#" + ticket.ticket_id)}</span>
              </div>
              <div class="muted">${escape(ticket.type)} · ${escape(ticket.state)}</div>
              <div class="state-line ${stateColorClass(ticket.state)}"></div>
            `;
            card.addEventListener("dragstart", (event) => {
              event.dataTransfer.setData("text/ticket-id", String(ticket.ticket_id));
            });
            card.addEventListener("click", () => openEdit(ticket));
            lane.appendChild(card);
          }
          boardEl.appendChild(lane);
        }
      }

      function normalizeStateForStage(stage, current) {
        if (stage === "done") return current === "fail" ? "fail" : "success";
        if (current === "active") return "active";
        return "idle";
      }

      async function moveTicketToStage(id, stage) {
        const ticket = tickets.find((item) => String(item.ticket_id) === String(id));
        if (!ticket || ticket.stage === stage) return;
        const payload = {
          title: ticket.title,
          description: ticket.description,
          acceptance_criteria: ticket.acceptance_criteria,
          parent_id: ticket.parent_id,
          assignee: ticket.assignee,
          priority: ticket.priority,
          order: ticket.order,
          estimate_effort: ticket.estimate_effort,
          estimate_complete: ticket.estimate_complete,
          stage,
          state: normalizeStateForStage(stage, ticket.state),
        };
        await call(`/api/tickets/${ticket.ticket_id}`, { method: "PUT", headers: headers(true), body: JSON.stringify(payload) });
        await loadTickets();
      }

      function closeModal() {
        modalOverlay.classList.add("hidden");
        draft = null;
        clearTimeout(autosaveTimer);
        autosaveTimer = null;
      }

      function openNew() {
        if (!selectedProjectID()) return;
        draft = { mode: "new", ticket: null };
        modalTitle.textContent = "New Ticket";
        setModalValues({ type: "task", title: "", description: "", stage: "design", state: "idle", open: true, archived: false });
        modalOverlay.classList.remove("hidden");
      }

      function openEdit(ticket) {
        draft = { mode: "edit", ticket: structuredClone(ticket) };
        modalTitle.textContent = ticket.key || `Ticket #${ticket.ticket_id}`;
        setModalValues(ticket);
        modalOverlay.classList.remove("hidden");
      }

      function modalValues() {
        return {
          type: document.getElementById("ticket-type").value,
          title: document.getElementById("ticket-title").value,
          description: document.getElementById("ticket-description").value,
          stage: document.getElementById("ticket-stage").value,
          state: document.getElementById("ticket-state").value,
        };
      }

      function setModalValues(ticket) {
        document.getElementById("ticket-type").value = ticket.type || "task";
        document.getElementById("ticket-title").value = ticket.title || "";
        document.getElementById("ticket-description").value = ticket.description || "";
        document.getElementById("ticket-stage").value = ticket.stage || "design";
        document.getElementById("ticket-state").value = ticket.state || "idle";
        document.getElementById("ticket-close-open").textContent = ticket.open === false ? "Open" : "Close";
        document.getElementById("ticket-archive").textContent = ticket.archived ? "Unarchive" : "Archive";
        document.getElementById("ticket-delete").disabled = !ticket.ticket_id;
      }

      function queueAutosave() {
        clearTimeout(autosaveTimer);
        autosaveTimer = setTimeout(async () => {
          try {
            await persistModal();
          } catch (err) {
            appStatus.textContent = `Save failed: ${err.message}`;
          }
        }, 250);
      }

      async function persistModal() {
        if (!draft) return;
        const values = modalValues();
        if (!values.title.trim()) return;
        if (draft.mode === "new" && !draft.ticket) {
          const created = await call("/api/tickets", {
            method: "POST",
            headers: headers(true),
            body: JSON.stringify({
              project_id: Number(selectedProjectID()),
              type: values.type,
              title: values.title,
              description: values.description,
              stage: values.stage,
              state: values.state,
            }),
          });
          draft.mode = "edit";
          draft.ticket = created;
          modalTitle.textContent = created.key || `Ticket #${created.ticket_id}`;
          setModalValues(created);
          await loadTickets();
          return;
        }
        if (!draft.ticket) return;
        const current = draft.ticket;
        const updated = await call(`/api/tickets/${current.ticket_id}`, {
          method: "PUT",
          headers: headers(true),
          body: JSON.stringify({
            title: values.title,
            description: values.description,
            acceptance_criteria: current.acceptance_criteria,
            parent_id: current.parent_id,
            assignee: current.assignee,
            priority: current.priority,
            order: current.order,
            estimate_effort: current.estimate_effort,
            estimate_complete: current.estimate_complete,
            stage: values.stage,
            state: values.state,
          }),
        });
        draft.ticket = updated;
        await loadTickets();
      }

      function connectWS() {
        if (socket) socket.close();
        if (socketRetry) clearTimeout(socketRetry);
        const protocol = location.protocol === "https:" ? "wss" : "ws";
        socket = new WebSocket(`${protocol}://${location.host}/api/ws`);
        socket.onmessage = async () => {
          if (app.classList.contains("hidden")) return;
          await loadTickets();
        };
        socket.onclose = () => {
          socketRetry = setTimeout(connectWS, 1200);
        };
      }

      function escape(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      document.getElementById("login-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const response = await call("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: document.getElementById("login-user").value,
              password: document.getElementById("login-pass").value,
            }),
          });
          token = response.token || "";
          localStorage.setItem("task-token", token);
          await init();
        } catch (err) {
          loginStatus.textContent = `Login failed: ${err.message}`;
        }
      });

      showRegisterBtn.addEventListener("click", () => {
        document.getElementById("login-form").classList.add("hidden");
        registerForm.classList.remove("hidden");
      });
      document.getElementById("hide-register").addEventListener("click", () => {
        registerForm.classList.add("hidden");
        document.getElementById("login-form").classList.remove("hidden");
      });
      registerForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          await call("/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: document.getElementById("register-user").value,
              password: document.getElementById("register-pass").value,
            }),
          });
          loginStatus.textContent = "Registered. You can now login.";
          registerForm.reset();
          registerForm.classList.add("hidden");
          document.getElementById("login-form").classList.remove("hidden");
        } catch (err) {
          loginStatus.textContent = `Registration failed: ${err.message}`;
        }
      });

      projectSelect.addEventListener("change", async () => {
        setSelectedProjectID(projectSelect.value);
        await loadTickets();
      });

      document.getElementById("project-new").addEventListener("click", async () => {
        const prefix = prompt("Project prefix (e.g. APP)");
        if (!prefix) return;
        const title = prompt("Project title");
        if (!title) return;
        await call("/api/projects", {
          method: "POST",
          headers: headers(true),
          body: JSON.stringify({ prefix, title }),
        });
        await loadProjects();
        await loadTickets();
      });

      document.getElementById("new-ticket").addEventListener("click", openNew);
      document.getElementById("logout").addEventListener("click", async () => {
        try { await call("/api/logout", { method: "POST", headers: headers() }); } catch {}
        token = "";
        localStorage.removeItem("task-token");
        showLogin("Logged out.");
      });

      document.getElementById("ticket-delete").addEventListener("click", async () => {
        if (!draft || !draft.ticket) return;
        await call(`/api/tickets/${draft.ticket.ticket_id}`, { method: "DELETE", headers: headers() });
        closeModal();
        await loadTickets();
      });

      document.getElementById("ticket-close-open").addEventListener("click", async () => {
        if (!draft || !draft.ticket) return;
        const next = draft.ticket.open === false ? "open" : "close";
        const updated = await call(`/api/tickets/${draft.ticket.ticket_id}/${next}`, { method: "POST", headers: headers() });
        draft.ticket = updated;
        setModalValues(updated);
        await loadTickets();
      });

      document.getElementById("ticket-archive").addEventListener("click", async () => {
        if (!draft || !draft.ticket) return;
        const next = draft.ticket.archived ? "unarchive" : "archive";
        const updated = await call(`/api/tickets/${draft.ticket.ticket_id}/${next}`, { method: "POST", headers: headers() });
        draft.ticket = updated;
        setModalValues(updated);
        await loadTickets();
      });

      ["ticket-title", "ticket-description", "ticket-type", "ticket-stage", "ticket-state"].forEach((id) => {
        document.getElementById(id).addEventListener("input", queueAutosave);
        document.getElementById(id).addEventListener("change", queueAutosave);
      });

      modalOverlay.addEventListener("click", (event) => {
        if (event.target === modalOverlay) closeModal();
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !modalOverlay.classList.contains("hidden")) {
          closeModal();
          return;
        }
        if (event.key.toLowerCase() === "n" && !event.metaKey && !event.ctrlKey && !event.altKey) {
          const tag = (document.activeElement && document.activeElement.tagName || "").toLowerCase();
          if (tag === "input" || tag === "textarea" || tag === "select") return;
          event.preventDefault();
          if (!app.classList.contains("hidden")) openNew();
        }
      });

      init();
    </script>
  </body>
</html>
