name: Makefile CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Install dependencies
      run: make setup

    - name: Run test
      run: make test-go-cover

    - name: Run build
      run: make build

    - name: Run gosec
      run: gosec ./...

    - name: Run govulncheck
      run: govulncheck ./...
