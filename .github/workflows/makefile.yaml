name: Makefile CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install dependencies
      run: make setup

    - name: Validate OpenAPI
      run: make validate-openapi

    - name: Run test
      run: make test-go-cover

    - name: Run build
      run: make build

    - name: Run lint
      run: make lint

    - name: Run gosec
      run: gosec ./...

    - name: Run govulncheck
      run: govulncheck ./...

  playwright:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Run Playwright tests
      run: make test-playwright

  publish:
    needs: [build, playwright]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create releases and push the version-bump commit
      packages: write   # push images to ghcr.io

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        # Use a PAT so the version-bump commit can trigger future workflows if needed.
        # Falls back to GITHUB_TOKEN if TAP_TOKEN is not set (won't retrigger CI either way).
        token: ${{ secrets.TAP_TOKEN || secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install release tools
      run: make setup-go

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Bump version
      run: make bump-version

    - name: Commit and push version bump
      run: |
        VERSION=$(cat cmd/tk/VERSION | tr -d '[:space:]')
        git add cmd/tk/VERSION
        git commit -m "chore: bump version to ${VERSION} [skip ci]"
        git push

    - name: Log in to GHCR
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      run: make docker-push

    - name: Create GitHub release and update Homebrew tap
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HOMEBREW_TAP_REPO: https://x-access-token:${{ secrets.TAP_TOKEN }}@github.com/simonski/homebrew-tap.git
      run: make release-publish
