                  type: string
                description:
                  type: string
                acceptance_criteria:
                  type: string
                git_repository:
                  type: string
                git_branch:
                  type: string
                parent_id:
                  type: string
                  nullable: true
                assignee:
                  type: string
                status:
                  type: string
                  description: Optional lifecycle status in `stage/state` form.
                stage:
                  type: string
                  description: Optional explicit lifecycle stage.
                  enum: [design, develop, test, done]
                state:
                  type: string
                  description: Optional explicit lifecycle state. `done` tickets accept only `success` or `fail`.
