paths:
  # ── Health ──────────────────────────────────────────────────────────
  /api/healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
        '500':
          $ref: '#/components/responses/InternalServerError'
  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics
      operationId: getMetrics
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        '200':
          description: Prometheus text exposition
          content:
            text/plain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/status:
    get:
      tags: [Health]
      summary: Server status and feature flags
      operationId: getStatus
      description: Returns server status. Includes user info if authenticated.
      responses:
        '200':
          description: Status information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  # ── Authentication ──────────────────────────────────────────────────
  /api/register:
    post:
      tags: [Auth]
      summary: Register a new user account
      operationId: register
      description: Registration must be enabled via system settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                password:
                  type: string
                  description: Optional; generated if omitted.
                email:
                  type: string
                  format: email
      responses:
        '201':
          description: User created and immediately approved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/User'
                  - type: object
                    properties:
                      password:
                        type: string
                        description: Returned when the server generated a password.
                      approved:
                        type: boolean
                        description: Whether the account can sign in immediately.
        '202':
          description: User created and awaiting admin approval
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/User'
                  - type: object
                    properties:
                      password:
                        type: string
                        description: Returned when the server generated a password.
                      approved:
                        type: boolean
                        description: Whether the account can sign in immediately.
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Registration disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limited

  /api/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive a session token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
            examples:
              typical:
                $ref: '#/components/examples/LoginRequestExample'
      responses:
        '200':
          description: Authenticated successfully
          headers:
            Set-Cookie:
              description: "__Host-session session cookie (secure requests); legacy ticket_token also accepted (HttpOnly, SameSite=Lax, 30-day expiry)"
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                success:
                  $ref: '#/components/examples/LoginResponseExample'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limited

  /api/logout:
    post:
      tags: [Auth]
      summary: Logout and clear session
      operationId: logout
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: logged_out

        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/auth/passkey/login/start:
    post:
      tags: [Auth]
      summary: Start a browser-assisted passkey login
      operationId: startPasskeyLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
      responses:
        '200':
          description: Verification URL and device code created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyStartResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: No passkeys are enrolled for the requested user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limited
  /api/auth/passkey/register/start:
    post:
      tags: [Auth]
      summary: Start authenticated passkey enrollment
      operationId: startPasskeyRegistration
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Optional user-visible label stored with the credential.
      responses:
        '200':
          description: Verification URL and device code created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyStartResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/auth/passkey/challenge:
    get:
      tags: [Auth]
      summary: Get the pending passkey browser challenge
      operationId: getPasskeyChallenge
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Browser challenge payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyChallengeResponse'
        '404':
          description: Passkey flow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: Passkey flow expired or already consumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/passkey/finish:
    post:
      tags: [Auth]
      summary: Finish a browser-assisted passkey ceremony
      operationId: finishPasskeyFlow
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Serialized PublicKeyCredential produced by the browser.
      responses:
        '200':
          description: Ceremony finished successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Passkey flow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: Passkey flow expired or already consumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limited
  /api/auth/passkey/poll:
    post:
      tags: [Auth]
      summary: Poll a pending passkey flow
      operationId: pollPasskeyFlow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        '200':
          description: Flow completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyPollResponse'
        '202':
          description: Flow is still pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyPollResponse'
        '404':
          description: Passkey flow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: Passkey flow expired or already consumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  # ── Configuration ───────────────────────────────────────────────────
  /api/config/registration:
    post:
      tags: [Config]
      summary: Enable or disable user registration
      operationId: setRegistration
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
                auto_approve:
                  type: boolean
                  description: When false, self-registration creates disabled users pending admin approval.
      responses:
        '200':
          description: Registration setting updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  registration_enabled:
                    type: boolean
                  registration_auto_approve:
                    type: boolean
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/config/chat_enabled:
    post:
      tags: [Config]
      summary: Enable or disable chat feature
      operationId: setChatEnabled
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Chat setting updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  chat_enabled:
                    type: boolean

        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/config/chat_limits:
    post:
      tags: [Config]
      summary: Set chat connection and duration limits
      operationId: setChatLimits
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                max_connections:
                  type: integer
                  default: 10
                max_duration_minutes:
                  type: integer
                  default: 30
      responses:
        '200':
          description: Chat limits updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  chat_max_connections:
                    type: integer
                  chat_max_duration_minutes:
                    type: integer

        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/config/settings:
    get:
      tags: [Config]
      summary: List raw application settings
      operationId: listConfigSettings
      security:
        - BearerAuth: []
      responses:
        '200':
          description: App settings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppSetting'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Config]
      summary: Create or replace an application setting
      operationId: createConfigSetting
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppSetting'
      responses:
        '200':
          description: App setting saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppSetting'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/config/settings/{key}:
    parameters:
      - in: path
        name: key
        required: true
        schema:
          type: string
    put:
      tags: [Config]
      summary: Update, replace, or rename an application setting
      operationId: updateConfigSetting
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppSetting'
      responses:
        '200':
          description: App setting updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppSetting'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Config]
      summary: Delete an application setting
      operationId: deleteConfigSetting
      security:
        - BearerAuth: []
      responses:
        '204':
          description: App setting deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  # ── Users ───────────────────────────────────────────────────────────
  /api/users:
    get:
      tags: [Users]
      summary: List all users
      operationId: listUsers
