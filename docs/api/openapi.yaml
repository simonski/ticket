openapi: 3.1.0
info:
  title: Ticket API
  version: 0.1.1102
  description: |
    RESTful API for the Ticket project and issue management system.
    All endpoints are under `/api/`. Authentication uses Bearer tokens
    or session cookies (`__Host-session` on secure requests; legacy
    `ticket_token` remains accepted).
    Agent endpoints use HTTP Basic Auth (agent UUID + password).
  contact:
    name: Simon Gauld
    url: https://github.com/simonski/ticket
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Health
    description: Health check and server status
  - name: Auth
    description: User registration, login, and logout
  - name: Config
    description: System configuration (admin only)
  - name: Users
    description: User management (admin only)
  - name: Agents
    description: Agent lifecycle and work assignment
  - name: Roles
    description: Role management (admin only)
  - name: Workflows
    description: Workflow and stage management
  - name: Teams
    description: Team management
  - name: Projects
    description: Project CRUD and membership
  - name: Releases
    description: Release delivery containers and lifecycle
  - name: Tickets
    description: Ticket CRUD, lifecycle, and operations
  - name: Stories
    description: User story management
  - name: Documents
    description: Project document and file management
  - name: Dependencies
    description: Ticket dependency links
  - name: Labels
    description: Label management
  - name: Time
    description: Time tracking
  - name: WebSocket
    description: Real-time WebSocket endpoints

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Session token from /api/login
    CookieAuth:
      type: apiKey
      in: cookie
      name: __Host-session
    BasicAuth:
      type: http
      scheme: basic
      description: Agent UUID as username, agent password as password

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
      example:
        error: "ticket not found"

    AppSetting:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
        value:
          type: string

    User:
      type: object
      example:
        user_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        username: "alice"
        role: "user"
        plan_id: 1
        plan_slug: "free"
        default_project_id: 7
        display_name: "Alice Smith"
        enabled: true
        user_type: "user"
      properties:
        user_id:
          type: string
          format: uuid
        username:
          type: string
        role:
          type: string
          enum: [admin, user]
        plan_id:
          type: integer
          format: int64
        plan_slug:
          type: string
        default_project_id:
          type: integer
          format: int64
          nullable: true
        display_name:
          type: string
        enabled:
          type: boolean
        user_type:
          type: string
          enum: [user, agent]
        email:
          type: string
        status:
          type: string
        description:
          type: string
        last_seen:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Agent:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            uuid:
              type: string
              format: uuid

    Plan:
      type: object
      properties:
        plan_id:
          type: integer
          format: int64
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        max_projects:
          type: integer
        max_private_projects:
          type: integer
        max_tickets:
          type: integer
        max_tickets_per_project:
          type: integer
        max_team_memberships:
          type: integer
        max_api_calls_per_day:
          type: integer
        default_project_alias:
          type: string
        registration_actions:
          type: object
          properties:
            auto_assign_public_team:
              type: boolean
            auto_create_private_team:
              type: boolean
            auto_create_private_project:
              type: boolean
            teams:
              type: array
              items:
                type: object
                properties:
                  team_id:
                    type: integer
                    format: int64
                  role:
                    type: string
            projects:
              type: array
              items:
                type: object
                properties:
                  project_id:
                    type: integer
                    format: int64
                  role:
                    type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        project_id:
          type: integer
          format: int64
        prefix:
          type: string
          description: 1-5 uppercase ASCII letters
          pattern: '^[A-Z]{1,5}$'
        title:
          type: string
        description:
          type: string
        acceptance_criteria:
          type: string
        git_repository:
          type: string
        notes:
          type: string
        status:
          type: string
          enum: [open, closed]
        visibility:
          type: string
          enum: [public, team, private]
        workflow_id:
          type: integer
          format: int64
          nullable: true
        ticket_sequence:
          type: integer
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        attrs:
          type: object
          additionalProperties: true
          description: >-
            Extensible attribute bag (epic TK-105). Optional/sparse fields stored
            without a schema migration. Omitting attrs on update preserves it.

    PullRequest:
      type: object
      description: >-
        A VCS-host-agnostic merge request that lives inside ticket, linked to a
        ticket and project. provider is "github" when the repository is a GitHub
        repo (url may point at the real PR) or "none" for a native PR.
      properties:
        id: { type: integer, format: int64 }
        project_id: { type: integer, format: int64 }
        ticket_id: { type: string }
        title: { type: string }
        description: { type: string }
        repository: { type: string }
        source_branch: { type: string }
        target_branch: { type: string }
        status: { type: string, enum: [draft, open, merged, closed] }
        provider: { type: string, enum: [none, github] }
        url: { type: string }
        created_by: { type: string }
        created_at: { type: string }
        updated_at: { type: string }
        merged_at: { type: string }

    Release:
      type: object
      description: >-
        Top-level delivery container for a project. Holds the features (and their
        epic/story subtrees) that are designed, sealed, then executed together.
      properties:
        id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        title:
          type: string
        purpose:
          type: string
        target_date:
          type: string
          description: Aspirational target delivery date
        status:
          type: string
          enum: [in_design, in_progress, complete]
          description: >-
            Release lifecycle. Features may only be added while `in_design`;
            `in_progress` means sealed and being executed by the orchestrator;
            `complete` is the terminal state.
        designed_at:
          type: string
          format: date-time
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        feature_count:
          type: integer
          description: Number of features in this release
        story_count:
          type: integer
          description: Number of stories across the release's features

    ProjectAccessRequest:
      type: object
      properties:
        request_id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        project_prefix:
          type: string
        project_title:
          type: string
        user_id:
          type: string
        username:
          type: string
        message:
          type: string
        decision_message:
          type: string
        decided_by:
          type: string
        decided_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, approved, rejected]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectAccessRequestMessage:
      type: object
      properties:
        message:
          type: string
          description: Optional note from the requester or approving admin.

    UserNotification:
      type: object
      properties:
        notification_id:
          type: integer
          format: int64
        user_id:
          type: string
        kind:
          type: string
        status:
          type: string
          enum: [unread, read]
        title:
          type: string
        message:
          type: string
        payload:
          type: string
          description: JSON string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        read_at:
          type: string
          format: date-time
          nullable: true

    Ticket:
      type: object
      properties:
        ticket_id:
          type: string
          description: "Human key, e.g. CUS-42"
        project_id:
          type: integer
          format: int64
        parent_id:
          type: string
          nullable: true
        clone_of:
          type: string
          nullable: true
        release_id:
          type: integer
          format: int64
          nullable: true
          description: Release this ticket belongs to (propagated across the feature subtree)
        type:
          type: string
          enum: [epic, story, task, bug, feature, idea, spike, chore, note, question, requirement, decision, action]
        title:
          type: string
        description:
          type: string
        acceptance_criteria:
          type: string
        git_repository:
          type: string
        git_branch:
          type: string
        workflow_stage_id:
          type: integer
          format: int64
          nullable: true
        stage:
          type: string
          enum: [design, develop, test, done]
        state:
          type: string
          enum: [idle, active, success, fail]
        status:
          type: string
          description: "Rendered as stage/state, e.g. develop/active"
        priority:
          type: integer
        sort_order:
          type: integer
        estimate_effort:
          type: integer
        estimate_complete:
          type: string
        health_score:
          type: integer
        assignee:
          type: string
        complete:
          type: boolean
          description: Whether the ticket is finished
        draft:
          type: boolean
          description: Whether the ticket is in draft mode
        role_id:
          type: integer
          format: int64
          nullable: true
          description: Current active role
        previous_workflow_stage_id:
          type: integer
          format: int64
          nullable: true
          description: Previous Workflow stage before last transition
        previous_role_id:
          type: integer
          format: int64
          nullable: true
          description: Previous role before last transition
        archived:
          type: boolean
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        started_at:
          type: string
          description: When the ticket last entered the active state (in-progress since).
        attrs:
          type: object
          additionalProperties: true
          description: >-
            Extensible attribute bag (epic TK-105). Home for optional, sparse,
            display-only and per-type fields; new fields are added without a schema
            migration. On update, omitting attrs preserves the existing bag.

    ResolvedGuidance:
      type: object
      properties:
        dor:
          type: string
        dod:
          type: string
        ac:
          type: string

    ExecutionPacketLayers:
      type: object
      properties:
        project:
          $ref: '#/components/schemas/ResolvedGuidance'
        phase:
          $ref: '#/components/schemas/ResolvedGuidance'
        role:
          $ref: '#/components/schemas/ResolvedGuidance'
        ticket:
          $ref: '#/components/schemas/ResolvedGuidance'

    ExecutionPacket:
      type: object
      required: [ticket_id, project_id, phase, layers, effective]
      properties:
        ticket_id:
          type: string
        project_id:
          type: integer
          format: int64
        phase:
          type: string
        workflow_id:
          type: integer
          format: int64
          nullable: true
        workflow_stage_id:
          type: integer
          format: int64
          nullable: true
        role_id:
          type: integer
          format: int64
          nullable: true
        role_title:
          type: string
        layers:
          $ref: '#/components/schemas/ExecutionPacketLayers'
        effective:
          $ref: '#/components/schemas/ResolvedGuidance'

    TicketPhaseSignoff:
      type: object
      required: [ticket_id, phase, approved]
      properties:
        ticket_id:
          type: string
        phase:
          type: string
          enum: [planning, implementation, verification]
        approved:
          type: boolean
        approved_by:
          type: string
        note:
          type: string
        updated_at:
          type: string
          format: date-time

    InboxEntry:
      type: object
      required: [inbox_id, project_id, ticket_id, kind, status]
      properties:
        inbox_id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        ticket_id:
          type: string
        kind:
          type: string
          enum: [failure_escalation]
        status:
          type: string
          enum: [open, resolved]
        recommendations:
          type: array
          items:
            type: string
        decision:
          type: string
        message:
          type: string
        created_by:
          type: string
        decided_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Workflow:
      type: object
      properties:
        workflow_id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        approval_policy:
          type: string
          enum: [single_role, all_roles]
        progression_mode:
          type: string
          enum: [linear, stage_only]
        stages:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStage'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkflowExport:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        approval_policy:
          type: string
          enum: [single_role, all_roles]
        progression_mode:
          type: string
          enum: [linear, stage_only]
        stages:
          type: array
          items:
            type: object
            properties:
              stage_name:
                type: string
              description:
                type: string
              roles:
                type: array
                items:
                  type: string
              next_stages:
                type: array
                description: Ordered target stage names for explicit DAG transitions.
                items:
                  type: string
              sort_order:
                type: integer

    WorkflowStage:
      type: object
      properties:
        workflow_stage_id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        stage_name:
          type: string
        description:
          type: string
        acceptance_criteria:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        next_stage_ids:
          type: array
          description: Ordered explicit transition targets for DAG-style progression.
          items:
            type: integer
            format: int64
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        attrs:
          type: object
          additionalProperties: true
          description: >-
            Extensible attribute bag (epic TK-105). Set via the stage attrs setter;
            preserved across normal stage updates.

    InterventionState:
      type: object
      properties:
        ticket_id:
          type: string
        project_id:
          type: integer
          format: int64
        state:
          type: string
          enum: [open, triaged, in_progress, resolved, wont_fix]
        owner_user_id:
          type: string
          nullable: true
        owner_name:
          type: string
        updated_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectForecastEntry:
      type: object
      properties:
        ticket_id:
          type: string
        key:
          type: string
        detail:
          type: string
        confidence_percent:
          type: integer
          minimum: 0
          maximum: 100

    ForecastCalibrationBucket:
      type: object
      properties:
        range:
          type: string
        total:
          type: integer
        hits:
          type: integer
        accuracy_rate:
          type: number
          format: float

    ProjectForecastCalibration:
      type: object
      properties:
        project_id:
          type: integer
        sample_count:
          type: integer
        hit_count:
          type: integer
        accuracy_rate:
          type: number
          format: float
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/ForecastCalibrationBucket'

    WorkItemQueueCandidate:
      type: object
      properties:
        ticket_id:
          type: string
        title:
          type: string
        priority:
          type: integer
        order:
          type: integer
        stage:
          type: string
        state:
          type: string
        assignee:
          type: string
        blocked:
          type: boolean
        blocked_by:
          type: string
        updated_at:
          type: string
          format: date-time

    InterventionReportItem:
      type: object
      properties:
        ticket_id:
          type: string
        title:
          type: string
        state:
          type: string
          enum: [open, triaged, in_progress, resolved, wont_fix]
        owner_user_id:
          type: string
          nullable: true
        owner_name:
          type: string
        age_hours:
          type: integer
        escalated:
          type: boolean
        updated_at:
          type: string
          format: date-time

    InterventionReport:
      type: object
      properties:
        project_id:
          type: integer
          format: int64
        open_count:
          type: integer
        triaged_count:
          type: integer
        in_progress_count:
          type: integer
        resolved_count:
          type: integer
        wont_fix_count:
          type: integer
        oldest_open_age_h:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/InterventionReportItem'
        trends:
          type: array
          items:
            $ref: '#/components/schemas/InterventionTrendPoint'

    InterventionTrendPoint:
      type: object
      properties:
        day:
          type: string
          format: date
        open_count:
          type: integer
        triaged_count:
          type: integer
        in_progress_count:
          type: integer
        resolved_count:
          type: integer
        wont_fix_count:
          type: integer

    WorkflowGraphValidation:
      type: object
      properties:
        workflow_id:
          type: integer
          format: int64
        stage_count:
          type: integer
        transition_count:
          type: integer
        terminal_stage_ids:
          type: array
          items:
            type: integer
            format: int64
        unreachable_stage_ids:
          type: array
          items:
            type: integer
            format: int64
        issues:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        valid:
          type: boolean

    Team:
      type: object
      properties:
        team_id:
          type: integer
          format: int64
        name:
          type: string
        parent_team_id:
          type: integer
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TeamMember:
      type: object
      properties:
        team_id:
          type: integer
          format: int64
        user_id:
          type: string
        role:
          type: string
        job_title:
          type: string
        created_at:
          type: string
          format: date-time

    Role:
      type: object
      properties:
        role_id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
          nullable: true
        title:
          type: string
        description:
          type: string
        acceptance_criteria:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        attrs:
          type: object
          additionalProperties: true
          description: >-
            Extensible attribute bag (epic TK-105). Optional/sparse fields stored
            without a schema migration. Omitting attrs on update preserves it.

    Label:
      type: object
      properties:
        label_id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        name:
          type: string
        color:
          type: string
        created_at:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        item_id:
          type: string
          description: Ticket ID
        user_id:
          type: string
        comment:
          type: string
        created_at:
          type: string
          format: date-time

    Dependency:
      type: object
      properties:
        id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        ticket_id:
          type: string
        depends_on:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time

    TimeEntry:
      type: object
      properties:
        time_entry_id:
          type: integer
          format: int64
        ticket_id:
          type: string
        user_id:
          type: string
        minutes:
          type: integer
        note:
          type: string
        created_at:
          type: string
          format: date-time

    Story:
      type: object
      properties:
        story_id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        status:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ContextEdge:
      type: object
      properties:
        edge_id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        source_type:
          type: string
          enum: [ticket, document, url]
        source_id:
          type: string
        target_type:
          type: string
          enum: [ticket, document, url]
        target_id:
          type: string
        relation:
          type: string
        title:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time

    ContextNode:
      type: object
      properties:
        type:
          type: string
          enum: [ticket, document, url]
        id:
          type: string
        title:
          type: string

    ContextGraph:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/ContextNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/ContextEdge'

    Document:
      type: object
      properties:
        document_id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        notes:
          type: string
        content:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DocumentFile:
      type: object
      properties:
        file_id:
          type: integer
          format: int64
        document_id:
          type: integer
          format: int64
        file_name:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        content:
          type: string
          format: byte
        created_at:
          type: string
          format: date-time

    HistoryEvent:
      type: object
      properties:
        id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        ticket_id:
          type: string
        event_type:
          type: string
        payload:
          type: string
          description: JSON string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time

    WorkItem:
      type: object
      properties:
        work_item_id:
          type: string
        ticket_id:
          type: string
        project_id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
          nullable: true
        workflow_stage_id:
          type: integer
          format: int64
          nullable: true
        role_id:
          type: integer
          format: int64
          nullable: true
        status:
          type: string
          enum: [active, success, fail, stopped]
        assignee_type:
          type: string
          enum: [human, agent]
        assignee_id:
          type: string
        objective_snapshot:
          type: string
        prompt_snapshot:
          type: string
        feedback:
          type: string
        commit_ref:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectMember:
      type: object
      properties:
        project_id:
          type: integer
          format: int64
        user_id:
          type: string
        role:
          type: string
          enum: [observer, commenter, member, admin]
        created_at:
          type: string
          format: date-time

    ProjectTeamMember:
      type: object
      properties:
        project_id:
          type: integer
          format: int64
        team_id:
          type: integer
          format: int64
        role:
          type: string
        created_at:
          type: string
          format: date-time

    CountSummary:
      type: object
      description: Aggregate counts by type and status

    StatusResponse:
      type: object
      properties:
        status:
          type: string
        authenticated:
          type: boolean
        registration_enabled:
          type: boolean
        registration_auto_approve:
          type: boolean
        chat_enabled:
          type: boolean
        chat_max_connections:
          type: integer
        chat_max_duration_minutes:
          type: integer
        chat_running_processes:
          type: integer
        server_version:
          type: string
        user:
          $ref: '#/components/schemas/User'

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    PasskeyStartResponse:
      type: object
      required: [verification_url, code, expires_at]
      properties:
        verification_url:
          type: string
          format: uri
        code:
          type: string
        expires_at:
          type: string

    PasskeyChallengeResponse:
      type: object
      required: [kind, public_key]
      properties:
        kind:
          type: string
          enum: [login, registration]
        public_key:
          type: object
          additionalProperties: true
          description: PublicKeyCredential request or creation options for the browser ceremony.

    PasskeyPollResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, complete]
        token:
          type: string
          description: Present when a login flow completes.
        user:
          $ref: '#/components/schemas/User'

    PasskeyCredential:
      type: object
      required: [credential_id, name, created_at, updated_at]
      properties:
        credential_id:
          type: string
        name:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        last_used_at:
          type: string

    PasskeyCredentialRenameRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    AgentWorkResponse:
      type: object
      properties:
        status:
          type: string
          enum: [NONE, NEW, CURRENT, REJECTED, ASSIGNED, AVAILABLE]
        project:
          $ref: '#/components/schemas/Project'
        ticket:
          $ref: '#/components/schemas/Ticket'
        parents:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        workflow:
          $ref: '#/components/schemas/Workflow'
        role:
          $ref: '#/components/schemas/Role'
        config:
          type: object
          additionalProperties:
            type: string
        config_updated_at:
          type: string

    TicketRequestResponse:
      type: object
      properties:
        status:
          type: string
          enum: [NONE, ASSIGNED, AVAILABLE, NO-WORK, REJECTED]
        ticket:
          $ref: '#/components/schemas/Ticket'
        project:
          $ref: '#/components/schemas/Project'
        parents:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        workflow:
          $ref: '#/components/schemas/Workflow'
        role:
          $ref: '#/components/schemas/Role'

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions for this operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Requested resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

