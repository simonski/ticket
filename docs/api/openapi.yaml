  # ── Tickets ─────────────────────────────────────────────────────────
  /api/tickets:
    post:
      tags: [Tickets]
      summary: Create a ticket
      operationId: createTicket
      security:
        - BearerAuth: []
      parameters:
        - name: X-Ticket-Git-Repository
          in: header
          required: false
          schema:
            type: string
          description: Optional git remote context used when `project_id` is omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, title]
              properties:
                project_id:
                  type: integer
                  format: int64
                  description: Optional explicit project. If omitted, the server resolves the project from the git header first, then the caller's private alias.
                parent_id:
                  type: string
                  nullable: true
                type:
                  type: string
                  enum: [epic, story, task, bug, feature, idea, spike, chore, note, question, requirement, decision, action]
                title:
                  type: string
                description:
                  type: string
                acceptance_criteria:
                  type: string
                git_repository:
                  type: string
                git_branch:
                  type: string
                priority:
                  type: integer
                estimate_effort:
                  type: integer
                estimate_complete:
                  type: string
                assignee:
                  type: string
                status:
                  type: string
                  description: Optional initial lifecycle status. New tickets must start in `design/*`.
                stage:
                  type: string
                  description: Optional explicit stage for new tickets. If provided, it must be `design`.
                  enum: [design]
                state:
                  type: string
                  description: Optional initial state for a newly created design-stage ticket.
                  enum: [idle, active, success, fail]
            examples:
              task:
                $ref: '#/components/examples/CreateTicketRequestExample'
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
              examples:
                created:
                  $ref: '#/components/examples/TicketExample'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/tickets/import-markdown:
