  /api/tickets:
    post:
      tags: [Tickets]
      summary: Create a ticket
      operationId: createTicket
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, type, title]
              properties:
                project_id:
                  type: integer
                  format: int64
                parent_id:
                  type: string
                  nullable: true
                type:
                  type: string
                  enum: [epic, story, task, bug, feature, idea, spike, chore, note, question, requirement, decision]
                title:
                  type: string
                description:
                  type: string
                acceptance_criteria:
                  type: string
                git_repository:
                  type: string
                git_branch:
                  type: string
                priority:
                  type: integer
                estimate_effort:
                  type: integer
                estimate_complete:
                  type: string
                assignee:
                  type: string
                status:
                  type: string
                  description: Optional initial lifecycle status. New tickets must start in `design/*`.
                stage:
                  type: string
                  description: Optional explicit stage for new tickets. If provided, it must be `design`.
                  enum: [design]
                state:
                  type: string
                  description: Optional initial state for a newly created design-stage ticket.
                  enum: [idle, active, success, fail]
            examples:
              task:
                $ref: '#/components/examples/CreateTicketRequestExample'
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
              examples:
                created:
                  $ref: '#/components/examples/TicketExample'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/tickets/claim:
    post:
      tags: [Tickets]
      summary: Claim or request a ticket for the authenticated user
      operationId: claimTicket
      description: |
        If ticket_id/ticket_ref is provided, claims that specific ticket.
        Otherwise, returns the user's current active ticket or assigns the next eligible one.
        Use dry_run=true to preview without changing state.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project_id:
                  type: integer
                  format: int64
                ticket_id:
                  type: string
                  nullable: true
                ticket_ref:
                  type: string
                dry_run:
                  type: boolean
      responses:
        '200':
          description: Claim result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketRequestResponse'
              examples:
                assigned:
                  $ref: '#/components/examples/ClaimTicketResponseExample'

        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
