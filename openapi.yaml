openapi: 3.1.0
info:
  title: Ticket API
  version: 0.1.870
  description: |
    RESTful API for the Ticket project and issue management system.
    All endpoints are under `/api/`. Authentication uses Bearer tokens
    or session cookies (`__Host-session` on secure requests; legacy
    `ticket_token` remains accepted).
    Agent endpoints use HTTP Basic Auth (agent UUID + password).
  contact:
    name: Simon Gauld
    url: https://github.com/simonski/ticket
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Health
    description: Health check and server status
  - name: Auth
    description: User registration, login, and logout
  - name: Config
    description: System configuration (admin only)
  - name: Users
    description: User management (admin only)
  - name: Agents
    description: Agent lifecycle and work assignment
  - name: Roles
    description: Role management (admin only)
  - name: Workflows
    description: Workflow and stage management
  - name: Teams
    description: Team management
  - name: Projects
    description: Project CRUD and membership
  - name: Tickets
    description: Ticket CRUD, lifecycle, and operations
  - name: Stories
    description: User story management
  - name: Dependencies
    description: Ticket dependency links
  - name: Labels
    description: Label management
  - name: Time
    description: Time tracking
  - name: WebSocket
    description: Real-time WebSocket endpoints

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Session token from /api/login
    CookieAuth:
      type: apiKey
      in: cookie
      name: __Host-session
    BasicAuth:
      type: http
      scheme: basic
      description: Agent UUID as username, agent password as password

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
      example:
        error: "ticket not found"

    User:
      type: object
      example:
        user_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        username: "alice"
        role: "user"
        display_name: "Alice Smith"
        enabled: true
        user_type: "user"
      properties:
        user_id:
          type: string
          format: uuid
        username:
          type: string
        role:
          type: string
          enum: [admin, user]
        display_name:
          type: string
        enabled:
          type: boolean
        user_type:
          type: string
          enum: [user, agent]
        email:
          type: string
        status:
          type: string
        description:
          type: string
        last_seen:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Agent:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            uuid:
              type: string
              format: uuid

    Project:
      type: object
      properties:
        project_id:
          type: integer
          format: int64
        prefix:
          type: string
          description: 1-5 uppercase ASCII letters
          pattern: '^[A-Z]{1,5}$'
        title:
          type: string
        description:
          type: string
        acceptance_criteria:
          type: string
        git_repository:
          type: string
        notes:
          type: string
        status:
          type: string
          enum: [open, closed]
        visibility:
          type: string
          enum: [public, private]
        workflow_id:
          type: integer
          format: int64
          nullable: true
        ticket_sequence:
          type: integer
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Ticket:
      type: object
      properties:
        ticket_id:
          type: string
          description: "Human key, e.g. CUS-42"
        project_id:
          type: integer
          format: int64
        parent_id:
          type: string
          nullable: true
        clone_of:
          type: string
          nullable: true
        type:
          type: string
          enum: [epic, story, task, bug, feature, idea, spike, chore, note, question, requirement, decision]
        title:
          type: string
        description:
          type: string
        acceptance_criteria:
          type: string
        git_repository:
          type: string
        git_branch:
          type: string
        workflow_stage_id:
          type: integer
          format: int64
          nullable: true
        stage:
          type: string
          enum: [design, develop, test, done]
        state:
          type: string
          enum: [idle, active, success, fail]
        status:
          type: string
          description: "Rendered as stage/state, e.g. develop/active"
        priority:
          type: integer
        sort_order:
          type: integer
        estimate_effort:
          type: integer
        estimate_complete:
          type: string
        health_score:
          type: integer
        assignee:
          type: string
        complete:
          type: boolean
          description: Whether the ticket is finished
        draft:
          type: boolean
          description: Whether the ticket is in draft mode
        role_id:
          type: integer
          format: int64
          nullable: true
          description: Current active role
        previous_workflow_stage_id:
          type: integer
          format: int64
          nullable: true
          description: Previous Workflow stage before last transition
        previous_role_id:
          type: integer
          format: int64
          nullable: true
          description: Previous role before last transition
        archived:
          type: boolean
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Workflow:
      type: object
      properties:
        workflow_id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        stages:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStage'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkflowExport:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        stages:
          type: array
          items:
            type: object
            properties:
              stage_name:
                type: string
              description:
                type: string
              roles:
                type: array
                items:
                  type: string
              sort_order:
                type: integer

    WorkflowStage:
      type: object
      properties:
        workflow_stage_id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        stage_name:
          type: string
        description:
          type: string
        acceptance_criteria:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Team:
      type: object
      properties:
        team_id:
          type: integer
          format: int64
        name:
          type: string
        parent_team_id:
          type: integer
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TeamMember:
      type: object
      properties:
        team_id:
          type: integer
          format: int64
        user_id:
          type: string
        role:
          type: string
        job_title:
          type: string
        created_at:
          type: string
          format: date-time

    Role:
      type: object
      properties:
        role_id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
          nullable: true
        title:
          type: string
        description:
          type: string
        acceptance_criteria:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Label:
      type: object
      properties:
        label_id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        name:
          type: string
        color:
          type: string
        created_at:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        item_id:
          type: string
          description: Ticket ID
        user_id:
          type: string
        comment:
          type: string
        created_at:
          type: string
          format: date-time

    Dependency:
      type: object
      properties:
        id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        ticket_id:
          type: string
        depends_on:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time

    TimeEntry:
      type: object
      properties:
        time_entry_id:
          type: integer
          format: int64
        ticket_id:
          type: string
        user_id:
          type: string
        minutes:
          type: integer
        note:
          type: string
        created_at:
          type: string
          format: date-time

    Story:
      type: object
      properties:
        story_id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        status:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    HistoryEvent:
      type: object
      properties:
        id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        ticket_id:
          type: string
        event_type:
          type: string
        payload:
          type: string
          description: JSON string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time

    ProjectMember:
      type: object
      properties:
        project_id:
          type: integer
          format: int64
        user_id:
          type: string
        role:
          type: string
          enum: [viewer, editor, owner]
        created_at:
          type: string
          format: date-time

    ProjectTeamMember:
      type: object
      properties:
        project_id:
          type: integer
          format: int64
        team_id:
          type: integer
          format: int64
        role:
          type: string
        created_at:
          type: string
          format: date-time

    CountSummary:
      type: object
      description: Aggregate counts by type and status

    StatusResponse:
      type: object
      properties:
        status:
          type: string
        authenticated:
          type: boolean
        registration_enabled:
          type: boolean
        chat_enabled:
          type: boolean
        chat_max_connections:
          type: integer
        chat_max_duration_minutes:
          type: integer
        chat_running_processes:
          type: integer
        server_version:
          type: string
        user:
          $ref: '#/components/schemas/User'

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    AgentWorkResponse:
      type: object
      properties:
        status:
          type: string
          enum: [NONE, NEW, CURRENT, REJECTED, ASSIGNED, AVAILABLE]
        project:
          $ref: '#/components/schemas/Project'
        ticket:
          $ref: '#/components/schemas/Ticket'
        parents:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        workflow:
          $ref: '#/components/schemas/Workflow'
        role:
          $ref: '#/components/schemas/Role'
        config:
          type: object
          additionalProperties:
            type: string
        config_updated_at:
          type: string

    TicketRequestResponse:
      type: object
      properties:
        status:
          type: string
          enum: [NONE, ASSIGNED, AVAILABLE, NO-WORK, REJECTED]
        ticket:
          $ref: '#/components/schemas/Ticket'
        project:
          $ref: '#/components/schemas/Project'
        parents:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        workflow:
          $ref: '#/components/schemas/Workflow'
        role:
          $ref: '#/components/schemas/Role'

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions for this operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Requested resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  examples:
    UserExample:
      summary: A typical user account
      value:
        user_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        username: "alice"
        role: "user"
        display_name: "Alice Smith"
        enabled: true
        user_type: "user"
        email: "alice@example.com"
        status: "active"
        created_at: "2025-01-15T10:00:00Z"
        updated_at: "2025-06-20T14:30:00Z"

    ProjectExample:
      summary: A typical project
      value:
        project_id: 1
        prefix: "CUS"
        title: "Customer Portal"
        description: "Customer-facing web portal project"
        status: "open"
        visibility: "private"
        created_at: "2025-01-15T10:00:00Z"
        updated_at: "2025-06-20T14:30:00Z"

    TicketExample:
      summary: A typical task ticket
      value:
        ticket_id: "CUS-42"
        project_id: 1
        type: "task"
        title: "Implement login page"
        description: "Build the user login page with form validation"
        stage: "develop"
        state: "active"
        status: "develop/active"
        priority: 2
        assignee: "alice"
        complete: false
        archived: false
        created_by: "admin"
        created_at: "2025-02-01T09:00:00Z"
        updated_at: "2025-06-20T14:30:00Z"

    LoginRequestExample:
      summary: Login request body
      value:
        username: "alice"
        password: "s3cr3tpassword"

    LoginResponseExample:
      summary: Successful login response
      value:
        token: "dGhpcyBpcyBhIGJhc2U2NHRva2Vu"
        user:
          user_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          username: "alice"
          role: "user"

    ProjectListExample:
      summary: Project list response
      value:
        - project_id: 1
          prefix: "CUS"
          title: "Customer Portal"
          description: "Customer-facing web portal project"
          status: "open"
          visibility: "private"
        - project_id: 2
          prefix: "OPS"
          title: "Operations Console"
          description: "Internal operational tooling"
          status: "open"
          visibility: "private"

    CreateProjectRequestExample:
      summary: Create project request
      value:
        prefix: "CUS"
        title: "Customer Portal"
        description: "Customer-facing web portal project"
        visibility: "private"
        workflow_id: 1

    CreateTicketRequestExample:
      summary: Create a task ticket
      value:
        project_id: 1
        type: "task"
        title: "Implement login page"
        description: "Build the user login page"
        parent_id: "CUS-E-1"
        priority: 2
        assignee: "alice"

    TicketListExample:
      summary: Ticket list response
      value:
        - ticket_id: "CUS-E-1"
          project_id: 1
          type: "epic"
          title: "Authentication improvements"
          stage: "develop"
          state: "active"
          status: "develop/active"
        - ticket_id: "CUS-42"
          project_id: 1
          type: "task"
          title: "Implement login page"
          stage: "develop"
          state: "active"
          status: "develop/active"

    UpdateTicketRequestExample:
      summary: Update ticket request
      value:
        title: "Implement login page and forgot-password flow"
        stage: "test"
        state: "idle"
        priority: 1
        assignee: "alice"

    HistoryEventListExample:
      summary: Ticket history response
      value:
        - id: 101
          project_id: 1
          ticket_id: "CUS-42"
          event_type: "ticket.created"
          payload: "{\"title\":\"Implement login page\"}"
          created_by: "admin"
          created_at: "2025-02-01T09:00:00Z"
        - id: 102
          project_id: 1
          ticket_id: "CUS-42"
          event_type: "ticket.updated"
          payload: "{\"stage\":\"test\",\"state\":\"idle\"}"
          created_by: "alice"
          created_at: "2025-02-03T14:30:00Z"

    ClaimTicketResponseExample:
      summary: Claim result with assigned ticket
      value:
        status: "ASSIGNED"
        ticket:
          ticket_id: "CUS-42"
          project_id: 1
          type: "task"
          title: "Implement login page"
          stage: "develop"
          state: "active"
          status: "develop/active"
        project:
          project_id: 1
          prefix: "CUS"
          title: "Customer Portal"

    ErrorExample:
      summary: A typical error response
      value:
        error: "ticket not found"

paths:
  # ── Health ──────────────────────────────────────────────────────────
  /api/healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
        '500':
          $ref: '#/components/responses/InternalServerError'
  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics
      operationId: getMetrics
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        '200':
          description: Prometheus text exposition
          content:
            text/plain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/status:
    get:
      tags: [Health]
      summary: Server status and feature flags
      operationId: getStatus
      description: Returns server status. Includes user info if authenticated.
      responses:
        '200':
          description: Status information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  # ── Authentication ──────────────────────────────────────────────────
  /api/register:
    post:
      tags: [Auth]
      summary: Register a new user account
      operationId: register
      description: Registration must be enabled via system settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Registration disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limited

  /api/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive a session token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
            examples:
              typical:
                $ref: '#/components/examples/LoginRequestExample'
      responses:
        '200':
          description: Authenticated successfully
          headers:
            Set-Cookie:
              description: "__Host-session session cookie (secure requests); legacy ticket_token also accepted (HttpOnly, SameSite=Lax, 30-day expiry)"
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                success:
                  $ref: '#/components/examples/LoginResponseExample'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limited

  /api/logout:
    post:
      tags: [Auth]
      summary: Logout and clear session
      operationId: logout
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: logged_out

        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  # ── Configuration ───────────────────────────────────────────────────
  /api/config/registration:
    post:
      tags: [Config]
      summary: Enable or disable user registration
      operationId: setRegistration
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Registration setting updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  registration_enabled:
                    type: boolean
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/config/chat_enabled:
    post:
      tags: [Config]
      summary: Enable or disable chat feature
      operationId: setChatEnabled
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Chat setting updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  chat_enabled:
                    type: boolean

        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/config/chat_limits:
    post:
      tags: [Config]
      summary: Set chat connection and duration limits
      operationId: setChatLimits
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                max_connections:
                  type: integer
                  default: 10
                max_duration_minutes:
                  type: integer
                  default: 30
      responses:
        '200':
          description: Chat limits updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  chat_max_connections:
                    type: integer
                  chat_max_duration_minutes:
                    type: integer

        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  # ── Users ───────────────────────────────────────────────────────────
  /api/users:
    get:
      tags: [Users]
      summary: List all users
      operationId: listUsers
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
