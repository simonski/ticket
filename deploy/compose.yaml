services:
  ticket:
    image: ghcr.io/simonski/ticket:latest
    ports:
      - "8080:8080"
    volumes:
      - ticket-data:/home/ticket/.ticket
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300
    restart: unless-stopped

volumes:
  ticket-data:
