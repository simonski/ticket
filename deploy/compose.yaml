services:
  ticket:
    image: ghcr.io/simonski/ticket:latest
    labels:
      - com.centurylinklabs.watchtower.enable=true
    environment:
      TICKET_DATA_DIR: /data
      TICKET_DB_PATH: /data/ticket.db
      TICKET_SERVER_ADDR: 0.0.0.0:8080
      TICKET_ADMIN_PASSWORD: ${TICKET_ADMIN_PASSWORD:?Set TICKET_ADMIN_PASSWORD before first boot}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  watchtower:
    image: containrrr/watchtower:latest
    command:
      - --label-enable
      - --cleanup
      - --interval
      - "30"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    read_only: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
